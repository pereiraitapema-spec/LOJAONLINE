<!DOCTYPE html>
<html>
<head>
  <title>Autenticando...</title>
  <meta charset="utf-8">
</head>
<body>
  <script>
    // Tenta avisar a janela pai que o login foi um sucesso
    try {
      if (window.opener) {
        window.opener.postMessage({ type: 'AUTH_SUCCESS' }, '*');
        // Dá um tempo para a mensagem ser processada antes de fechar
        setTimeout(function() {
          window.close();
        }, 1000);
      } else {
        // Se não for popup, volta para a home
        window.location.href = '/';
      }
    } catch (e) {
      console.error('Erro no callback:', e);
      window.location.href = '/';
    }
  </script>
  <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; text-align: center; padding: 20px;">
    <h2 style="color: #4f46e5;">Autenticação Concluída!</h2>
    <p style="color: #64748b;">Esta janela fechará automaticamente em instantes...</p>
    <button onclick="window.close()" style="margin-top: 20px; padding: 10px 20px; background: #4f46e5; color: white; border: none; border-radius: 8px; cursor: pointer;">
      Fechar Janela
    </button>
  </div>
</body>
</html>
